# ============================================================
# Solstice — Docker Compose (Full Stack)
# ============================================================
# Runs the entire Solstice stack locally:
# - Backend (Fastify)
# - Dashboard (Next.js)
# - PostgreSQL
# - Redis
# - Prometheus
# - Grafana
# ============================================================

services:
  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: solstice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: solstice
      POSTGRES_USER: solstice
      POSTGRES_PASSWORD: solstice_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solstice"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: solstice-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend ────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: solstice-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://solstice:solstice_password@postgres:5432/solstice?schema=public
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Dashboard ──────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: solstice-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:3001/ws
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

  # ─── Prometheus ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: solstice-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  # ─── Grafana ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: solstice-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: solstice
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/solstice.json
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
